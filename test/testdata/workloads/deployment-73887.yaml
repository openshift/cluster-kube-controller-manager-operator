apiVersion: apps/v1
kind: Deployment
metadata:
  name: replicas-mismatch
spec:
  replicas: 5
  selector:
    matchLabels:
      app: replicas-mismatch
  template:
    metadata:
      labels:
        app: replicas-mismatch
    spec:
      nodeSelector:
        non-existent-label/kcm-e2e-73887: "true"
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: busybox
        image: quay.io/openshifttest/busybox@sha256:c5439d7db88ab5423999530349d327b04279ad3161d7596d2126dfb5b02bfd1f
        command: ["sh", "-c", "sleep 3600"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
