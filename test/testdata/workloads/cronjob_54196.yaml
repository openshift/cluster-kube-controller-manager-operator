apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: cronjob-with-timezone-template
objects:
- kind: CronJob
  apiVersion: batch/v1
  metadata:
    name: "${CNAME}"
    namespace: "${NAMESPACE}"
  spec:
    schedule: "${SCHEDULE}"
    timeZone: "${TIMEZONE}"
    jobTemplate:
      spec:
        template:
          spec:
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
            - name: hello
              image: quay.io/openshifttest/busybox@sha256:c5439d7db88ab5423999530349d327b04279ad3161d7596d2126dfb5b02bfd1f
              imagePullPolicy: IfNotPresent
              command:
              - /bin/sh
              - -c
              - date; echo Hello from the CronJob
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                  - ALL
            restartPolicy: OnFailure

parameters:
- name: CNAME
- name: NAMESPACE
- name: SCHEDULE
- name: TIMEZONE
