apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: deploy-duplicatepodsrs-template
objects:
- kind: ReplicaSet
  apiVersion: apps/v1
  metadata:
    name: "${DNAME}"
    namespace: "${NAMESPACE}"
  spec:
    replicas: ${{REPLICASNUM}}
    selector:
      matchLabels:
        tier: "${DNAME}"
      matchExpressions:
        - {key: tier, operator: In, values: ["${DNAME}"]}
    template:
      metadata:
        labels:
          app: "${DNAME}"
          tier: "${DNAME}"
      spec:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        containers:
        - name: "${DNAME}"
          image: quay.io/openshifttest/hello-openshift@sha256:4200f438cf2e9446f6bcff9d67ceea1f69ed07a2f83363b7fb52529f7ddd8a83
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
          env:
          - name: GET_HOSTS_FROM
            value: dns
          ports:
          - containerPort: 8080
parameters:
- name: DNAME
- name: NAMESPACE
- name: REPLICASNUM
